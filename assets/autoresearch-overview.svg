<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Auto Research Overview</title>
  <desc id="desc">A loop showing auto research stages: understand literature, propose hypotheses, test experiments, write results, verify claims, and remember reusable skills, supported by benchmarks and infrastructure.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c2410c"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #475569; }
      .stage { fill: #f8fafc; stroke: #475569; stroke-width: 2; }
      .stage-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .stage-desc { font: 400 15px Arial, Helvetica, sans-serif; fill: #334155; }
      .support { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; }
      .support-title { font: 700 19px Arial, Helvetica, sans-serif; fill: #7c2d12; }
      .support-desc { font: 400 14px Arial, Helvetica, sans-serif; fill: #9a3412; }
      .human { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
      .human-title { font: 700 19px Arial, Helvetica, sans-serif; fill: #312e81; }
      .human-desc { font: 400 14px Arial, Helvetica, sans-serif; fill: #4338ca; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.4; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .support-arrow { stroke: #c2410c; stroke-width: 2; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrow-orange); }
      .label { font: 400 13px Arial, Helvetica, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="620"/>

  <text class="title" x="640" y="58" text-anchor="middle">Auto Research Overview</text>
  <text class="subtitle" x="640" y="88" text-anchor="middle">A semi-automated loop from evidence to ideas, experiments, writing, audit, and reusable memory.</text>

  <rect class="human" x="280" y="118" width="720" height="62" rx="14"/>
  <text class="human-title" x="640" y="144" text-anchor="middle">Human Steering</text>
  <text class="human-desc" x="640" y="166" text-anchor="middle">goals, constraints, novelty judgment, approvals, ethics, and privacy</text>

  <rect class="stage" x="52" y="248" width="166" height="96" rx="14"/>
  <text class="stage-title" x="135" y="282" text-anchor="middle">Understand</text>
  <text class="stage-desc" x="135" y="308" text-anchor="middle">Literature</text>
  <text class="stage-desc" x="135" y="329" text-anchor="middle">Discovery</text>

  <rect class="stage" x="252" y="248" width="166" height="96" rx="14"/>
  <text class="stage-title" x="335" y="282" text-anchor="middle">Propose</text>
  <text class="stage-desc" x="335" y="308" text-anchor="middle">Hypotheses</text>
  <text class="stage-desc" x="335" y="329" text-anchor="middle">&amp; Debate</text>

  <rect class="stage" x="452" y="248" width="166" height="96" rx="14"/>
  <text class="stage-title" x="535" y="282" text-anchor="middle">Test</text>
  <text class="stage-desc" x="535" y="308" text-anchor="middle">Experiments</text>
  <text class="stage-desc" x="535" y="329" text-anchor="middle">&amp; Code</text>

  <rect class="stage" x="652" y="248" width="166" height="96" rx="14"/>
  <text class="stage-title" x="735" y="282" text-anchor="middle">Write</text>
  <text class="stage-desc" x="735" y="308" text-anchor="middle">Drafts</text>
  <text class="stage-desc" x="735" y="329" text-anchor="middle">&amp; Review</text>

  <rect class="stage" x="852" y="248" width="166" height="96" rx="14"/>
  <text class="stage-title" x="935" y="282" text-anchor="middle">Verify</text>
  <text class="stage-desc" x="935" y="308" text-anchor="middle">Claims</text>
  <text class="stage-desc" x="935" y="329" text-anchor="middle">&amp; Trajectories</text>

  <rect class="stage" x="1052" y="248" width="166" height="96" rx="14"/>
  <text class="stage-title" x="1135" y="282" text-anchor="middle">Remember</text>
  <text class="stage-desc" x="1135" y="308" text-anchor="middle">Memory</text>
  <text class="stage-desc" x="1135" y="329" text-anchor="middle">&amp; Skills</text>

  <path class="arrow" d="M 218 296 L 244 296"/>
  <path class="arrow" d="M 418 296 L 444 296"/>
  <path class="arrow" d="M 618 296 L 644 296"/>
  <path class="arrow" d="M 818 296 L 844 296"/>
  <path class="arrow" d="M 1018 296 L 1044 296"/>

  <path class="dash" d="M 1135 248 C 1135 206, 930 202, 640 202 C 350 202, 135 206, 135 240"/>
  <text class="label" x="640" y="220" text-anchor="middle">new evidence and lessons feed the next cycle</text>

  <path class="support-arrow" d="M 640 180 L 640 238"/>

  <rect class="support" x="214" y="430" width="360" height="86" rx="14"/>
  <text class="support-title" x="394" y="462" text-anchor="middle">Benchmarks</text>
  <text class="support-desc" x="394" y="488" text-anchor="middle">evaluate search, experiments, reproduction, and audit</text>

  <rect class="support" x="706" y="430" width="360" height="86" rx="14"/>
  <text class="support-title" x="886" y="462" text-anchor="middle">Infrastructure</text>
  <text class="support-desc" x="886" y="488" text-anchor="middle">paper APIs, tools, sandboxes, memory, and orchestration</text>

  <path class="support-arrow" d="M 330 430 C 260 390, 170 382, 135 352"/>
  <path class="support-arrow" d="M 394 430 C 430 390, 500 382, 535 352"/>
  <path class="support-arrow" d="M 470 430 C 620 385, 850 382, 935 352"/>

  <path class="support-arrow" d="M 820 430 C 720 386, 260 382, 135 352"/>
  <path class="support-arrow" d="M 886 430 C 850 390, 610 382, 535 352"/>
  <path class="support-arrow" d="M 950 430 C 1010 390, 1100 382, 1135 352"/>

  <text class="label" x="640" y="562" text-anchor="middle">Most systems cover a subset of this loop; end-to-end systems try to connect several stages.</text>
</svg>
